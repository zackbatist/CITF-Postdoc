# qc-atelier Configuration File
# Place in your project root or set QC_ATELIER_CONFIG env var

directories:
  json_dir: "qc/json"                                   # JSON exports from qc pre-render
  output_dir: "qc"                                      # Where qc-reflect.html is written
  logs_dir: "reflect-logs"                              # Conversation logs (relative to output_dir)

files:
  output_file: "qc-reflect.html"
  css_file: "assets/scripts/qc-reflect/qc-reflect.css"
  js_file: "assets/scripts/qc-reflect/qc-reflect.js"
  codebook: "qc/codebook.yaml"

ollama:
  url: "http://localhost:11434"
  model: "qwen2.5:14b"
  num_ctx: 32768                                        # Context window tokens

# How many top overlap candidates to surface automatically
# (ranked by co-occurrence density across documents)
candidates:
  max_pairs: 40                                         # Max pairs in final queue (after LLM ranking)
  max_cross_category: 20                               # Max cross-category pairs from phase 2
  max_excerpts_per_code: 20                             # Cap excerpts sent to LLM per report

# Code schema for display colours (mirrors viz: section of this file)
code_schema:
  categories:
    "10": "People"
    "11": "Roles and positions"
    "20": "Organizations"
    "21": "Research consortia"
    "22": "Projects / Studies"
