# qc-atelier Configuration File
# Place in your project root or set QC_ATELIER_CONFIG env var

# ── Shared directories ────────────────────────────────────────────────────────
directories:
  output_dir: "qc"                                      # Base qc output directory
  corpus_dir: "qc/corpus"                               # Interview transcripts
  exclude_dir: "qc/corpus/exclude"                      # Corpus files skipped at render
  json_dir: "qc/json"                                   # JSON exports from qc pre-render
  codebook_path: "qc/codebook.yaml"                     # qc codebook (read by all tools)
  logs_dir: "reflect-logs"                              # Reflect conversation logs (relative to output_dir)
  venv: "qc/bin/activate"                               # Python virtual environment

# ── Shared code schema ────────────────────────────────────────────────────────
# Used by qc-viz (display) and qc-reflect (candidate ranking colours).
code_schema:
  categories:
    "10": "People"
    "11": "Roles and positions"
    "20": "Organizations"
    "21": "Research consortia"
    "22": "Projects / Studies"
    "30": "Activities"
    "40": "Abstractions"
    "41": "Kinds of work"
    "43": "Kinds of data"
    "44": "Kinds of relationships"
    "50": "Challenges and resolutions"
    "51": "Goals"
    "52": "Challenges"
    "53": "Means"
    "54": "Contexts"
    "55": "Hypotheticals"
    "56": "Outcomes"
    "57": "Facilitators"
    "58": "Drivers"
    "60": "Figurations"
    "61": "Analogies"
    "62": "Stories"
    "63": "Comparisons"
    "70": "Concepts"
    "80": "Qualities"
  colors:
    "10": "#2196F3"
    "11": "#1976D2"
    "20": "#FF9800"
    "21": "#F57C00"
    "22": "#E64A19"
    "30": "#9C27B0"
    "40": "#4CAF50"
    "41": "#388E3C"
    "43": "#2E7D32"
    "44": "#1B5E20"
    "50": "#E91E63"
    "51": "#C2185B"
    "52": "#AD1457"
    "53": "#880E4F"
    "54": "#F06292"
    "55": "#EC407A"
    "56": "#D81B60"
    "57": "#C2185B"
    "58": "#AD1457"
    "60": "#FFC107"
    "61": "#FFA000"
    "62": "#FF8F00"
    "63": "#FF6F00"
    "70": "#9C27B0"
    "80": "#009688"
  default_color: "#757575"

# ── Server (qc-atelier-server.py) ─────────────────────────────────────────────
server:
  port: 8080
  qc_bin: "/Users/zackbatist/.local/pipx/venvs/qualitative-coding/bin/qc"

# ── Ollama (qc-reflect) ───────────────────────────────────────────────────────
ollama:
  url: http://localhost:11444
  model: qwen2.5:7b
  num_ctx: 32768

# ── qc-reflect candidates ─────────────────────────────────────────────────────
candidates:
  max_pairs: 40                                         # Max pairs in final queue (after LLM ranking)
  max_cross_category: 20                               # Max cross-category pairs from phase 2
  max_excerpts_per_code: 20                             # Cap excerpts sent to LLM per report

# ── qc-viz ────────────────────────────────────────────────────────────────────
viz:
  files:
    output_file: "qc-viz.html"
    css_file: "qc-atelier/qc-viz/qc-viz.css"
    js_file: "qc-atelier/qc-viz/qc-viz.js"

  code_filters:
    whitelist:
      enabled: false
      codes: []
      prefixes: []
      prefix_ranges: []
      patterns: []
      branches: []
    blacklist:
      enabled: true
      codes: [
        "O_Apprehension",
        "O_Asserting_authority",
        "O_Awkwardness",
        "O_Building_a_team",
        "O_CITF_Databank_as_research_centre",
        "O_CITF_Databank_as_service",
        "O_Centralized_model",
        "O_Collaborative_fit",
        "O_Comparing_CITF_with_other_initiatives",
        "O_Competition",
        "O_Data_sharing_policies",
        "O_Engaging_with_stakeholders",
        "O_Establishing_consent_elements",
        "O_Establishing_core_data_elements",
        "O_Federated_model",
        "O_Finding_collaborators",
        "O_Harmonization",
        "O_Having_a_plan_for_data",
        "O_Intellectual_property",
        "O_Lack_of_purpose",
        "O_Striking_balance_between_stakeholder_interests",
        "O_Unwillingness_t",
        "O_share_data",
        "O_Working_things_out"
      ]
      prefixes: []
      prefix_ranges: []
      patterns: []
      branches: []

  display:
    speaker_column:
      min_width: 80
      max_width: 200
      char_multiplier: 8
    sections:
      default_collapsed: false
      preserve_filename_format: true
    code_tags:
      show_full_code: true

  export:
    include_filter_params: true
    timestamp_format: "%Y%m%d_%H%M%S"
    filename_prefix: "qc-viz-export"

  ui:
    filters:
      code_categories_collapsed: true
      show_uncoded_default: false
      speakers_default: "all"
    persistence:
      enabled: true
      storage_key: "qc-viz-state"

  codebook:
    enabled: false                                      # Read schema from qc codebook

  advanced:
    json_line_offset: 1
    max_codes_per_category: 1000
    verbose: false
    include_stats: true
