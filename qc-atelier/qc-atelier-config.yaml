# qc-atelier Configuration File
# Place in your project root or set QC_ATELIER_CONFIG env var

# ── Shared directories ────────────────────────────────────────────────────────
directories:
  output_dir: "qc"
  data_dir: "qc"                                      # Base qc output directory
  corpus_dir: "qc/corpus"                               # Interview transcripts
  exclude_dir: "qc/corpus/exclude"                      # Corpus files skipped at render
  json_dir: "qc/json"                                   # JSON exports from qc pre-render
  codebook_path: "qc/codebook.yaml"                     # qc codebook (read by all tools)
  logs_dir: "reflect-logs"                              # Reflect conversation logs (relative to output_dir)
  venv: "qc/bin/activate"                               # Python virtual environment

# ── Shared code schema ────────────────────────────────────────────────────────
# Colours are assigned algorithmically from this palette in codebook prefix order.
# No per-branch entries needed.
code_schema:
  palette:
    - "#2196F3"
    - "#FF9800"
    - "#9C27B0"
    - "#4CAF50"
    - "#E91E63"
    - "#FFC107"
    - "#009688"
    - "#F44336"
    - "#00BCD4"
    - "#8BC34A"
  default_color: "#757575"

# ── Server (qc-atelier-server.py) ─────────────────────────────────────────────
server:
  port: 8080
  qc_bin: "/Users/zackbatist/.local/pipx/venvs/qualitative-coding/bin/qc"

# ── Ollama (qc-reflect) ───────────────────────────────────────────────────────
ollama:
  url: http://localhost:11444
  model: qwen2.5:7b
  num_ctx: 32768

# ── qc-reflect candidates ─────────────────────────────────────────────────────
candidates:
  max_pairs: 40                                         # Max pairs in final queue (after LLM ranking)
  max_cross_category: 20                               # Max cross-category pairs from phase 2
  max_excerpts_per_code: 20                             # Cap excerpts sent to LLM per report

# ── qc-viz ────────────────────────────────────────────────────────────────────
viz:
  files:
    output_file: "qc-viz.html"
    css_file: "qc-atelier/qc-viz/qc-viz.css"
    js_file: "qc-atelier/qc-viz/qc-viz.js"

# ── qc-viz advanced ──────────────────────────────────────────────────────────
advanced:
    json_line_offset: 1
    max_codes_per_category: 1000
    verbose: false
    include_stats: true
